name: Scrape Daily Menus

on:
  schedule:
    - cron: '0 8 * * *'  # 8 AM UTC = 2 AM Mountain (summer)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scraping_scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scraping_scripts/requirements.txt

      - name: Scrape C4C
        run: python scraping_scripts/c4c_dining.py

      - name: Scrape Libby
        run: python scraping_scripts/libby_dining.py

      - name: Scrape Sewall
        run: python scraping_scripts/sewall_dining.py

      - name: Scrape Village Center
        run: python scraping_scripts/village_center_dining.py

      - name: Scrape The Alley
        run: python scraping_scripts/alley_dining.py

      - name: Commit updated menus
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scraping_scripts/data/
          if git diff --cached --quiet; then
            echo "No menu changes today"
          else
            git commit -m "chore: refresh dining menus $(date -u +%Y-%m-%d)"
            git push
          fi
