# Generated template — run `fly launch` inside backend/ to fill in app name and region,
# or replace <app-name> manually after `fly apps create <app-name>`.

app = "<app-name>"
primary_region = "den"   # Denver — closest region to Boulder, CO

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false   # keep always-on within free 3-VM allowance
  auto_start_machines = true
  min_machines_running = 1     # no cold starts

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[[vm]]
  memory = "256mb"   # free tier max per machine
  cpu_kind = "shared"
  cpus = 1
